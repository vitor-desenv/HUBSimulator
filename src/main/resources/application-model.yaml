spring:
  application:
    name: hub

  datasource:
    url: jdbc:postgresql://localhost:5432/hub_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/hub_db
    user: postgres
    password: password
    locations: classpath:db/migration
    baseline-on-migrate: true
